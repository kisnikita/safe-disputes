name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.2"
          cache-dependency-path: apps/backend/go.sum

      - name: Setup sqlc
        uses: sqlc-dev/setup-sqlc@v3
        with:
          sqlc-version: "1.30.0"

      - name: Install goose
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@v3.20.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run migrations
        run: goose -dir apps/backend/migrations postgres "postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable" up

      - name: Check sqlc generated models are up-to-date
        working-directory: apps/backend
        run: |
          sqlc generate -f sqlc.yaml
          rm -f internal/models/db_mock.go
          rm -f internal/models/sqlc_query_mock.sql.go
          git diff -- internal/models
          git diff --exit-code -- internal/models

      - name: Run backend tests
        working-directory: apps/backend
        run: go test ./...

      - name: Roll back migrations
        run: goose -dir apps/backend/migrations postgres "postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable" reset
