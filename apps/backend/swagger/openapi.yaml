openapi: 3.0.3
info:
  title: Safe Disputes Backend API
  version: 1.0.0
  description: API documentation for Safe Disputes backend.
servers:
  - url: /
security:
  - tmaAuth: []
paths:
  /swagger/openapi.yaml:
    get:
      tags: [Swagger]
      summary: Get OpenAPI spec
      description: Public endpoint without authentication.
      security: []
      responses:
        '200':
          description: OpenAPI YAML document
          content:
            application/yaml:
              schema:
                type: string

  /api/v1/auth/telegram:
    post:
      tags: [Auth]
      summary: Authenticate Telegram user and create user if needed
      responses:
        '200':
          description: OK
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/users:
    patch:
      tags: [Users]
      summary: Update current user settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '204':
          description: Updated
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          description: Failed to update user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/top:
    get:
      tags: [Users]
      summary: Get top users by rating
      responses:
        '200':
          description: Top users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          description: Failed to get top users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/disputes:
    get:
      tags: [Disputes]
      summary: List disputes
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/DisputeStatus'
          description: Default is current
        - in: query
          name: result
          schema:
            type: boolean
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            default: 10
        - in: query
          name: cursor
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Disputes list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisputeListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [Disputes]
      summary: Create dispute
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateDisputeRequest'
      responses:
        '201':
          description: Created
        '400':
          description: Invalid body or domain validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Opponent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Domain conflict or transaction execution failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Transaction monitor unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '504':
          description: Transaction not finalized in time
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/changes:
    get:
      tags: [Changes]
      summary: Get disputes and investigations changes since timestamp
      parameters:
        - in: query
          name: since
          required: true
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Changes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/disputes/mark-seen:
    post:
      tags: [Disputes]
      summary: Mark disputes as seen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkDisputesSeenRequest'
      responses:
        '204':
          description: Marked
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/disputes/precheck:
    post:
      tags: [Disputes]
      summary: Validate dispute creation params before on-chain tx
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisputePrecheckRequest'
      responses:
        '204':
          description: Precheck passed
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Opponent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Domain conflict (self opponent, minimal amount, opponent not ready, tx failed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/disputes/{id}:
    get:
      tags: [Disputes]
      summary: Get dispute by ID
      parameters:
        - $ref: '#/components/parameters/DisputeID'
      responses:
        '200':
          description: Dispute
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisputeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/disputes/{id}/evidence:
    get:
      tags: [Disputes]
      summary: Get dispute data for evidence flow
      parameters:
        - $ref: '#/components/parameters/DisputeID'
      responses:
        '200':
          description: Dispute
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisputeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [Evidence]
      summary: Add evidence to dispute
      parameters:
        - $ref: '#/components/parameters/DisputeID'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProvideEvidenceRequest'
      responses:
        '204':
          description: Evidence submitted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/disputes/{id}/accept:
    post:
      tags: [Disputes]
      summary: Accept dispute
      parameters:
        - $ref: '#/components/parameters/DisputeID'
      responses:
        '204':
          description: Accepted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/disputes/{id}/reject:
    post:
      tags: [Disputes]
      summary: Reject dispute
      parameters:
        - $ref: '#/components/parameters/DisputeID'
      responses:
        '204':
          description: Rejected
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/disputes/{id}/refund:
    post:
      tags: [Disputes]
      summary: Claim dispute
      parameters:
        - $ref: '#/components/parameters/DisputeID'
      responses:
        '204':
          description: Claimed
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/disputes/{id}/vote:
    post:
      tags: [Disputes]
      summary: Vote in dispute
      parameters:
        - $ref: '#/components/parameters/DisputeID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisputeVoteRequest'
      responses:
        '204':
          description: Vote submitted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/evidence:
    get:
      tags: [Evidence]
      summary: Get evidences by dispute
      parameters:
        - in: query
          name: disputeID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Evidence list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidencesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/investigations:
    get:
      tags: [Investigations]
      summary: List investigations
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/InvestigationStatus'
          description: Default is open in handler parsing, model statuses are current/passed.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            default: 10
        - in: query
          name: cursor
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Investigations list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvestigationListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/investigations/{id}:
    get:
      tags: [Investigations]
      summary: Get investigation by ID
      parameters:
        - $ref: '#/components/parameters/InvestigationID'
      responses:
        '200':
          description: Investigation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvestigationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/investigations/{id}/vote:
    post:
      tags: [Investigations]
      summary: Vote in investigation
      parameters:
        - $ref: '#/components/parameters/InvestigationID'
        - in: query
          name: vote
          required: true
          schema:
            type: string
            enum: [p1, p2, draw]
      responses:
        '204':
          description: Vote submitted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/investigations/mark-seen:
    post:
      tags: [Investigations]
      summary: Mark investigations as seen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkInvestigationsSeenRequest'
      responses:
        '204':
          description: Marked
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    tmaAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Use `tma <initDataRaw>` format.

  parameters:
    DisputeID:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    InvestigationID:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    DisputeStatus:
      type: string
      enum: [current, new, passed]

    DisputeResult:
      type: string
      enum: [new, sent, processed, answered, evidence, evidence_answered, inspected, rejected, win, lose, draw]

    InvestigationStatus:
      type: string
      enum: [current, passed]

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        chatID:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        notificationEnabled:
          type: boolean
        disputeReadiness:
          type: boolean
        investigationReadiness:
          type: boolean
        minimumDisputeAmountNano:
          type: integer
          format: int64
        rating:
          type: integer

    UserUpdateRequest:
      type: object
      properties:
        notificationEnabled:
          type: boolean
        disputeReadiness:
          type: boolean
        investigationReadiness:
          type: boolean
        minimumDisputeAmountNano:
          type: string
          description: Positive integer in nanoTON, encoded as string.
        rating:
          type: integer

    DisputeCard:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        amountNano:
          type: integer
          format: int64
        depositNano:
          type: integer
          format: int64
        endsAt:
          type: string
          format: date-time
        nextDeadline:
          type: string
          format: date-time
        opponent:
          type: string
        photoUrl:
          type: string
          nullable: true
        result:
          $ref: '#/components/schemas/DisputeResult'
        isClaimable:
          type: boolean
        isWin:
          type: boolean
        createdAt:
          type: string
          format: date-time
        isUnread:
          type: boolean

    Dispute:
      allOf:
        - $ref: '#/components/schemas/DisputeCard'
        - type: object
          properties:
            description:
              type: string
            updatedAt:
              type: string
              format: date-time
            cryptocurrency:
              type: string
            imageData:
              type: string
              format: byte
            imageType:
              type: string
            contractAddress:
              type: string

    CreateDisputeRequest:
      type: object
      required: [title, description, opponent, amountNano, depositNano, contractAddress, boc]
      properties:
        title:
          type: string
        description:
          type: string
        opponent:
          type: string
        amountNano:
          type: string
          description: Positive integer in nanoTON, encoded as string.
        depositNano:
          type: string
          description: Positive integer in nanoTON, encoded as string.
        contractAddress:
          type: string
        boc:
          type: string
        image:
          type: string
          format: binary

    DisputePrecheckRequest:
      type: object
      required: [opponent, amountNano]
      properties:
        opponent:
          type: string
        amountNano:
          type: string
          description: Positive integer in nanoTON, encoded as string.

    DisputeVoteRequest:
      type: object
      required: [isWin]
      properties:
        isWin:
          type: boolean

    Evidence:
      type: object
      properties:
        id:
          type: string
          format: uuid
        disputeID:
          type: string
          format: uuid
        userID:
          type: string
          format: uuid
        description:
          type: string
        imageData:
          type: string
          format: byte
        imageType:
          type: string

    ProvideEvidenceRequest:
      type: object
      properties:
        description:
          type: string
        evidence:
          type: string
          format: binary

    Investigation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        disputeID:
          type: string
          format: uuid
        total:
          type: integer
        p1:
          type: integer
        p2:
          type: integer
        draw:
          type: integer
        status:
          $ref: '#/components/schemas/InvestigationStatus'
        createdAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        title:
          type: string
        result:
          $ref: '#/components/schemas/InvestigationResult'
        vote:
          type: string
        isUnread:
          type: boolean

    UserResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'

    UsersResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'

    DisputeResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Dispute'

    DisputeListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DisputeCard'
        nextCursor:
          type: string
          nullable: true

    DisputeChange:
      type: object
      properties:
        disputeID:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/DisputeStatus'

    InvestigationChange:
      type: object
      properties:
        investigationID:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/InvestigationStatus'

    DisputeUnreadCounts:
      type: object
      properties:
        new:
          type: integer
        current:
          type: integer
        passed:
          type: integer

    InvestigationUnreadCounts:
      type: object
      properties:
        current:
          type: integer
        passed:
          type: integer

    ChangesData:
      type: object
      properties:
        disputes:
          type: array
          items:
            $ref: '#/components/schemas/DisputeChange'
        investigations:
          type: array
          items:
            $ref: '#/components/schemas/InvestigationChange'

    ChangesUnreadCounts:
      type: object
      properties:
        disputes:
          $ref: '#/components/schemas/DisputeUnreadCounts'
        investigations:
          $ref: '#/components/schemas/InvestigationUnreadCounts'

    ChangesResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/ChangesData'
        unreadCounts:
          $ref: '#/components/schemas/ChangesUnreadCounts'
        nextSince:
          type: string
          format: date-time

    MarkDisputesSeenRequest:
      type: object
      required: [disputeIDs]
      properties:
        disputeIDs:
          type: array
          items:
            type: string
            format: uuid

    MarkInvestigationsSeenRequest:
      type: object
      required: [investigationIDs]
      properties:
        investigationIDs:
          type: array
          items:
            type: string
            format: uuid

    EvidencesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Evidence'

    InvestigationResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Investigation'

    InvestigationListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Investigation'
        nextCursor:
          type: string
          nullable: true
